openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Pressbox Wire — multi-sport (NFL/MLB/NBA) news + AI insights API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: teams
    description: NFL team operations
  - name: alerts
    description: News alert operations
  - name: preferences
    description: User preference operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams across sports (filterable by sport)
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
          description: Filter by sport (nfl, mlb, nba, ncaaf, golf). Omit for all sports.
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a single team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List news alerts
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
          description: Filter by sport (nfl, mlb, nba, ncaaf, golf)
        - name: teamId
          in: query
          required: false
          schema:
            type: string
          description: Filter by team id
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by alert category (player_update, team_update, coaching_update, general)
        - name: priority
          in: query
          required: false
          schema:
            type: string
          description: Filter by priority (breaking, high, normal)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{alertId}:
    get:
      operationId: getAlert
      tags: [alerts]
      summary: Get a single alert
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/feed:
    get:
      operationId: getAlertFeed
      tags: [alerts]
      summary: Get the live alert feed grouped by drop time
      parameters:
        - name: teamIds
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of team ids to include. Empty means all teams.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: sport
          in: query
          required: false
          schema:
            type: string
          description: Filter by sport (nfl, mlb, nba, ncaaf, golf). Omit for all sports.
        - name: showAll
          in: query
          required: false
          schema:
            type: boolean
          description: Include low-priority noise items (default false — noise is excluded).
      responses:
        "200":
          description: Feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/breaking:
    get:
      operationId: getBreakingAlerts
      tags: [alerts]
      summary: Get the most recent breaking alerts across the league
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
          description: Filter by sport (nfl, mlb, nba, ncaaf, golf)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Breaking alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/by-team:
    get:
      operationId: getAlertsByTeam
      tags: [alerts]
      summary: Get alerts grouped by team
      parameters:
        - name: limitPerTeam
          in: query
          required: false
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Alerts grouped by team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamAlertsGroup"

  /alerts/refresh:
    post:
      operationId: refreshAlerts
      tags: [alerts]
      summary: Trigger a manual refresh of news from all team feeds
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResult"

  /stats/overview:
    get:
      operationId: getOverviewStats
      tags: [alerts]
      summary: Dashboard overview stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewStats"

  /stats/trending-teams:
    get:
      operationId: getTrendingTeams
      tags: [alerts]
      summary: Teams with most news activity in the last 24h
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
          description: Filter by sport (nfl, mlb, nba, ncaaf, golf)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 8
      responses:
        "200":
          description: Trending teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingTeam"

  /insights:
    get:
      operationId: listInsights
      tags: [insights]
      summary: List AI-generated stats and trends insights
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
          description: Filter by sport (nfl, mlb, nba, ncaaf, golf)
        - name: teamId
          in: query
          required: false
          schema:
            type: string
          description: Filter to a specific team (omit for league-wide + all teams)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: A list of AI-generated insights, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"

  /insights/generate:
    post:
      operationId: generateInsights
      tags: [insights]
      summary: Trigger AI generation of new insights from recent alerts
      responses:
        "200":
          description: Generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightGenerationResult"

  /preferences:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get user team preferences (by client identifier)
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"
    put:
      operationId: updatePreferences
      tags: [preferences]
      summary: Update user team preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencesInput"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Team:
      type: object
      properties:
        id:
          type: string
        sport:
          type: string
          description: nfl, mlb, or nba
        name:
          type: string
        city:
          type: string
        abbreviation:
          type: string
        conference:
          type: string
        division:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        logoUrl:
          type: string
        slug:
          type: string
        alertCount:
          type: integer
      required:
        - id
        - sport
        - name
        - city
        - abbreviation
        - conference
        - division
        - primaryColor
        - secondaryColor
        - slug

    Alert:
      type: object
      properties:
        id:
          type: string
        sport:
          type: string
          description: nfl, mlb, nba, ncaaf, golf
        importanceScore:
          type: integer
          description: Numeric importance score 1-10; alerts scoring 8+ are breaking-tier
          minimum: 1
          maximum: 10
        teamId:
          type: string
        teamName:
          type: string
        teamCity:
          type: string
        teamAbbreviation:
          type: string
        teamPrimaryColor:
          type: string
        teamSecondaryColor:
          type: string
        teamLogoUrl:
          type: string
        headline:
          type: string
        summary:
          type: string
        category:
          type: string
          description: player_update, team_update, coaching_update, general
        priority:
          type: string
          description: breaking, high, normal
        sourceName:
          type: string
        sourceUrl:
          type: string
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - teamId
        - teamName
        - teamCity
        - teamAbbreviation
        - teamPrimaryColor
        - teamSecondaryColor
        - headline
        - category
        - priority
        - sourceName
        - sourceUrl
        - publishedAt
        - createdAt

    TeamAlertsGroup:
      type: object
      properties:
        team:
          $ref: "#/components/schemas/Team"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
      required:
        - team
        - alerts

    OverviewStats:
      type: object
      properties:
        totalAlerts:
          type: integer
        alertsLast24h:
          type: integer
        breakingCount:
          type: integer
        teamsTracked:
          type: integer
        lastRefreshAt:
          type: string
          format: date-time
        categoryCounts:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
      required:
        - totalAlerts
        - alertsLast24h
        - breakingCount
        - teamsTracked
        - categoryCounts

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required:
        - category
        - count

    TrendingTeam:
      type: object
      properties:
        team:
          $ref: "#/components/schemas/Team"
        alertsLast24h:
          type: integer
        latestHeadline:
          type: string
      required:
        - team
        - alertsLast24h

    RefreshResult:
      type: object
      properties:
        teamsRefreshed:
          type: integer
        newAlerts:
          type: integer
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
      required:
        - teamsRefreshed
        - newAlerts
        - startedAt
        - finishedAt

    Preferences:
      type: object
      properties:
        clientId:
          type: string
        followedTeamIds:
          type: array
          items:
            type: string
        categoriesEnabled:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - clientId
        - followedTeamIds
        - categoriesEnabled

    Insight:
      type: object
      properties:
        id:
          type: string
        sport:
          type: string
          description: nfl, mlb, or nba (when team scoped)
        teamId:
          type: string
          description: Optional - omitted for league-wide insights
        teamName:
          type: string
        teamCity:
          type: string
        teamAbbreviation:
          type: string
        teamPrimaryColor:
          type: string
        teamSecondaryColor:
          type: string
        insightType:
          type: string
          description: trend, prediction, stat, matchup
        title:
          type: string
        body:
          type: string
        confidence:
          type: integer
        tags:
          type: array
          items:
            type: string
        relatedAlertIds:
          type: array
          items:
            type: string
        generatedAt:
          type: string
          format: date-time
      required:
        - id
        - insightType
        - title
        - body
        - confidence
        - tags
        - relatedAlertIds
        - generatedAt

    InsightGenerationResult:
      type: object
      properties:
        generated:
          type: integer
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
      required:
        - generated
        - startedAt
        - finishedAt

    PreferencesInput:
      type: object
      properties:
        clientId:
          type: string
        followedTeamIds:
          type: array
          items:
            type: string
        categoriesEnabled:
          type: array
          items:
            type: string
      required:
        - clientId
        - followedTeamIds
        - categoriesEnabled
